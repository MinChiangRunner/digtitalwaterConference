<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大会报告查询</title>
  <style>
    :root { color-scheme: light; --ink:#0f172a; --muted:#64748b; --line:#dbe7f3; --blue:#2563eb; --cyan:#0891b2; --bg:#f6faff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Microsoft YaHei", "PingFang SC", Arial, sans-serif; background:linear-gradient(180deg,#f6faff,#eef6ff); color:var(--ink); }
    header { padding:28px 32px 18px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.92); }
    h1 { margin:0 0 8px; font-size:26px; letter-spacing:0; }
    a { color:var(--blue); text-decoration:none; }
    main { max-width:1360px; margin:0 auto; padding:24px 24px 40px; }
    .meta, .muted { color:var(--muted); font-size:14px; }
    .cards { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; margin-bottom:18px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:16px 18px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
    .card b { display:block; font-size:30px; margin-bottom:4px; color:var(--blue); }
    .card span { color:var(--muted); font-size:14px; }
    .toolbar { display:grid; grid-template-columns:2fr repeat(3,1fr); gap:10px; margin:8px 0 14px; }
    input, select { width:100%; height:42px; border:1px solid var(--line); border-radius:6px; padding:0 12px; background:#fff; color:var(--ink); font-size:15px; }
    .layout { display:block; margin-top:14px; }
    .section-label { display:flex; align-items:center; justify-content:space-between; gap:14px; margin:18px 0 10px; color:var(--muted); font-size:14px; }
    .section-label strong { color:var(--ink); font-size:18px; }
    .table-wrap { width:100%; overflow:visible; border-radius:8px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
    table { width:100%; table-layout:fixed; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    col.col-topic { width:14%; }
    col.col-report-type { width:8%; }
    col.col-speaker { width:8%; }
    col.col-identity { width:9%; }
    col.col-institution { width:18%; }
    col.col-title { width:34%; }
    col.col-payment { width:9%; }
    th, td { padding:9px 10px; border-bottom:1px solid #edf3f9; text-align:left; vertical-align:top; font-size:13px; line-height:1.45; overflow-wrap:anywhere; word-break:break-word; }
    th { background:#0f2a4a; color:#fff; position:static; z-index:auto; }
    tr:hover td { background:#f8fbff; }
    .title { max-width:420px; }
    .unit-panel { margin:18px 0 22px; background:#fff; border:1px solid var(--line); border-radius:8px; padding:16px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
    .unit-panel h2 { margin:0 0 12px; font-size:18px; }
    .unit-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px 16px; }
    .unit-row { min-width:0; padding:9px 10px; border:1px solid #edf3f9; border-radius:6px; background:#fbfdff; }
    .unit-name { display:flex; align-items:center; justify-content:space-between; gap:10px; font-weight:600; color:#1e293b; }
    .unit-name span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .unit-name b { color:#0f172a; font-size:16px; }
    .stacked-bar { display:flex; height:9px; background:#e8f1fb; border-radius:999px; overflow:hidden; margin-top:7px; }
    .fill-oral { height:100%; background:#2563eb; }
    .fill-poster { height:100%; background:#f97316; }
    .unit-meta { margin-top:5px; color:var(--muted); font-size:12px; }
    .legend { display:flex; gap:14px; margin:-4px 0 12px; color:var(--muted); font-size:13px; }
    .legend i { display:inline-block; width:18px; height:9px; border-radius:999px; margin-right:5px; vertical-align:middle; }
    .nav { display:flex; gap:14px; margin-top:8px; }
    @media (max-width: 1100px) { .unit-grid { grid-template-columns:1fr; } }
    @media (max-width: 900px) { .cards, .toolbar, .unit-grid { grid-template-columns:1fr; } th, td { font-size:12px; padding:8px 7px; } }
  </style>
</head>
<body>
  <header>
    <h1 id="siteTitle">大会报告查询</h1>
    <div class="meta" id="meta">正在加载数据...</div>
    <nav class="nav"><a href="soil.html">土壤水研究大会</a><a href="water.html">数字水圈论坛</a><a href="index.html">入口页</a></nav>
  </header>
  <main>
    <section class="cards" id="cards"></section>
    <section class="unit-panel">
      <h2>&#20998;&#20250;&#22330;&#25253;&#21578;&#25968;&#37327;&#32479;&#35745;</h2>
      <div class="legend"><span><i style="background:#2563eb"></i>&#21475;&#22836;&#25253;&#21578;</span><span><i style="background:#f97316"></i>&#22681;&#25253;</span></div>
      <div class="unit-grid" id="sessions"></div>
    </section>
    <section class="unit-panel">
      <h2>单位投稿排行</h2>
      <div class="legend"><span><i style="background:#2563eb"></i>口头报告</span><span><i style="background:#f97316"></i>墙报</span></div>
      <div class="unit-grid" id="units"></div>
    </section>
    <section class="toolbar">
      <input id="q" placeholder="搜索报告人、单位、题目、专题、缴费状态" />
      <select id="topic"><option value="">全部专题</option></select>
      <select id="type"><option value="">全部报告类型</option></select>
      <select id="identity"><option value="">全部身份</option></select>
    </section>
    <div class="section-label"><strong>报告人信息列表</strong><span id="resultCount"></span></div>
    <section class="layout">
      <div class="table-wrap">
        <table>
          <colgroup>
            <col class="col-topic">
            <col class="col-report-type">
            <col class="col-speaker">
            <col class="col-identity">
            <col class="col-institution">
            <col class="col-title">
            <col class="col-payment">
          </colgroup>
          <thead>
            <tr>
              <th>专题名称</th>
              <th>报告类型</th>
              <th>报告人</th>
              <th>身份</th>
              <th>单位</th>
              <th>报告题目</th>
              <th>缴费状态</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    const DATA_FILE = "water.json";
    const state = { data:null, rows:[] };
    const $ = id => document.getElementById(id);
    const uniq = arr => [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b), 'zh-CN'));
    const val = x => x == null ? '' : String(x);
    function fillSelect(id, values) {
      const el = $(id);
      const current = el.value;
      el.length = 1;
      values.forEach(v => { const opt=document.createElement('option'); opt.value=v; opt.textContent=v; el.appendChild(opt); });
      if ([...el.options].some(opt => opt.value === current)) el.value = current;
    }
    function fillSelectPairs(id, values) {
      const el = $(id);
      const current = el.value;
      el.length = 1;
      values.forEach(v => { const opt=document.createElement('option'); opt.value=v.value; opt.textContent=v.label; el.appendChild(opt); });
      if ([...el.options].some(opt => opt.value === current)) el.value = current;
    }
    function renderCards(data) {
      const rows = data.speakers || [];
      const oral = rows.filter(r => r.report_type_code === 'oral').length;
      const poster = rows.filter(r => r.report_type_code === 'poster').length;
      const paid = rows.filter(r => r.payment_paid).length;
      const units = uniq((data.units || []).map(r=>r.institution)).length;
      $('cards').innerHTML = [
        ['报告总数', rows.length], ['口头报告', oral], ['墙报', poster], ['已缴费', paid], ['投稿单位', units]
      ].map(([k,v]) => `<div class="card"><b>${v}</b><span>${k}</span></div>`).join('');
    }
    function filteredRows() {
      const q = val($('q').value).trim().toLowerCase();
      const filters = ['topic','type','identity'].reduce((o,id)=>(o[id]=$(id).value,o),{});
      return state.rows.filter(r => {
        if (filters.topic && r.topic !== filters.topic) return false;
        if (filters.type && r.report_type_code !== filters.type) return false;
        if (filters.identity && r.identity !== filters.identity) return false;
        if (!q) return true;
        return ['speaker','institution','title','topic','identity','payment'].some(k => val(r[k]).toLowerCase().includes(q));
      });
    }
    function renderTable() {
      const rows = filteredRows();
      $('resultCount').textContent = `${rows.length} 条报告`;
      const cols = state.data.speaker_columns || [];
      $('tbody').innerHTML = rows.map(r => `<tr>${cols.map(c=>`<td class="${c.key==='title'?'title':''}">${val(r[c.key])}</td>`).join('')}</tr>`).join('');
    }
    function renderSessions(data) {
      const rows = (data.sessions || []).slice().sort((a,b)=>(+b.total||0)-(+a.total||0));
      const max = Math.max(1, ...rows.map(r=>+r.total||0));
      $('sessions').innerHTML = rows.map(r=>{
        const total = +r.total || 0;
        const oral = +r.oral || 0;
        const poster = +r.poster || 0;
        const full = total / max * 100;
        const oralW = total ? full * oral / total : 0;
        const posterW = total ? full * poster / total : 0;
        return `<div class="unit-row"><div class="unit-name"><span title="${r.name}">${r.name}</span><b>${total}</b></div><div class="stacked-bar"><div class="fill-oral" style="width:${oralW.toFixed(1)}%"></div><div class="fill-poster" style="width:${posterW.toFixed(1)}%"></div></div><div class="unit-meta">口头 ${oral} ｜ 墙报 ${poster}</div></div>`;
      }).join('');
    }
    function renderUnits(data) {
      const rows = (data.units || []).slice().sort((a,b)=>(+b.total||0)-(+a.total||0));
      const max = Math.max(1, ...rows.map(r=>+r.total||0));
      $('units').innerHTML = rows.map(r=>{
        const total = +r.total || 0;
        const oral = +r.oral || 0;
        const poster = +r.poster || 0;
        const full = total / max * 100;
        const oralW = total ? full * oral / total : 0;
        const posterW = total ? full * poster / total : 0;
        return `<div class="unit-row"><div class="unit-name"><span title="${r.institution}">${r.institution}</span><b>${total}</b></div><div class="stacked-bar"><div class="fill-oral" style="width:${oralW.toFixed(1)}%"></div><div class="fill-poster" style="width:${posterW.toFixed(1)}%"></div></div><div class="unit-meta">口头 ${oral} ｜ 墙报 ${poster}</div></div>`;
      }).join('');
    }
    fetch(DATA_FILE + '?t=' + Date.now()).then(r=>r.json()).then(data => {
      state.data = data; state.rows = data.speakers || [];
      $('siteTitle').textContent = data.meta.title;
      $('meta').textContent = `数据截止时间：${data.meta.generated_at} ｜ 来源：${data.meta.source_file} ｜ 已包含缴费状态`;
      renderCards(data);
      fillSelect('topic', uniq(state.rows.map(r=>r.topic)));
      fillSelectPairs('type', [
        { value: 'oral', label: '口头报告' },
        { value: 'poster', label: '墙报' },
      ].filter(item => state.rows.some(r => r.report_type_code === item.value)));
      fillSelect('identity', uniq(state.rows.map(r=>r.identity)));
      $('q').addEventListener('input', renderTable);
      ['topic','type','identity'].forEach(id => $(id).addEventListener('change', renderTable));
      renderTable();
      renderSessions(data);
      renderUnits(data);
    });
  </script>
</body>
</html>
